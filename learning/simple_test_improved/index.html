<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test (Improved)</title>
    <style>
        /* Light Theme: Soft Greys */
        :root {
            --bg-color: #f5f5f5;
            --panel-bg: #ffffff;
            --sidebar-bg: #f8f8f8;
            --text-color: #333;
            --text-color-secondary: #666;
            --border-color: #ddd;
            --splitter-bg: #e0e0e0;
            --hover-bg: #e8e8e8;
            --selected-bg: #e0e0e0;
            --button-bg: #f0f0f0;
            --input-bg: #ffffff;
            --input-border: #ccc;
            --accent-color: #007acc;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: var(--bg-color); color: var(--text-color); }
        
        #workspace { display: flex; flex: 1; overflow: hidden; }
        
        #left-panel { display: flex; flex-direction: column; background: var(--sidebar-bg); width: 350px; min-width: 200px; border-right: 1px solid var(--border-color); }
        
        #splitter { width: 4px; background: var(--splitter-bg); cursor: col-resize; z-index: 10; transition: background 0.2s; }
        #splitter:hover, #splitter.dragging { background: var(--accent-color); }

        #right-panel { flex: 1; display: flex; flex-direction: column; background: var(--panel-bg); position: relative; min-width: 100px; }
        
        #file-list-wrapper { flex: 1; overflow-y: auto; }
        #viewport { width: 100%; height: 100%; overflow: hidden; }
        
        /* Explorer / Tree Styles */
        .explorer-toolbar {
            padding: 10px 15px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .explorer-title {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-color-secondary);
            letter-spacing: 0.5px;
        }
        .explorer-actions .icon-btn {
            margin-left: 10px;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.7;
            color: var(--text-color);
        }
        .explorer-actions .icon-btn:hover { opacity: 1; color: var(--accent-color); }

        .file-tree {
            padding: 10px 0;
            font-size: 13px;
        }
        .tree-row {
            display: flex;
            align-items: center;
            padding: 4px 15px;
            cursor: pointer;
            user-select: none;
            color: var(--text-color);
        }
        .tree-row:hover { background: var(--hover-bg); color: var(--text-color); }
        .tree-row.selected { background: var(--selected-bg); color: var(--text-color); }
        
        .node-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 5px;}
        .rename-input { 
            background: var(--input-bg); border: 1px solid var(--accent-color); color: var(--text-color); width: 100%; box-sizing: border-box; 
            font-family: inherit; font-size: inherit; outline: none;
        }
        
        .row-controls {
            display: none;
            align-items: center;
        }
        .tree-row:hover .row-controls { display: flex; }
        
        .row-controls .icon-btn {
            margin-left: 6px;
            font-size: 12px;
            opacity: 0.6;
            cursor: pointer;
            color: var(--text-color);
        }
        .row-controls .icon-btn:hover { opacity: 1; transform: scale(1.1); color: var(--text-color); }
        .delete-btn:hover { color: #d32f2f !important; }

        /* Tree Editor Area */
        .tree-editor-area {
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg);
            margin-bottom: 5px;
        }
        
        /* Rest of styles remain... */
        .editor-toolbar { padding: 5px 10px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: flex-end; }
        .run-btn { background: #4caf50; color: white; border: none; padding: 4px 12px; cursor: pointer; border-radius: 2px; }
        .run-btn:hover { background: #43a047; }
        
        .file-output { 
            background: #f9f9f9; 
            color: var(--text-color-secondary); 
            font-family: monospace; 
            font-size: 11px; 
            padding: 8px; 
            max-height: 200px; 
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
            white-space: pre-wrap;
        }
        .file-output.error { color: #d32f2f; }
        .file-output.success { border-left: 2px solid #4caf50; }
        
        /* Utility */
        #splitter { width: 4px; background: var(--splitter-bg); cursor: col-resize; z-index: 10; transition: background 0.2s; }
        #splitter:hover, #splitter.dragging { background: var(--accent-color); }

        #workspace { display: flex; flex: 1; overflow: hidden; }
        
        #left-panel { display: flex; flex-direction: column; background: var(--sidebar-bg); width: 350px; min-width: 200px; border-right: 1px solid var(--border-color); }
        #right-panel { flex: 1; display: flex; flex-direction: column; background: var(--panel-bg); position: relative; min-width: 100px; }
        
        #file-list-wrapper { flex: 1; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="workspace">
        <div id="imports-panel" style="background: var(--sidebar-bg); padding: 10px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 5px; width: 200px; min-width: 150px; color: var(--text-color);">
            <div style="font-size: 11px; font-weight: bold; color: var(--text-color-secondary); margin-bottom: 5px;">GLOBAL IMPORTS</div>
            <label style="font-size: 11px; display: flex; align-items: center; gap: 5px; color: var(--text-color);">
                <input type="checkbox" id="chk-compas-geo"> compas.geometry as cg
            </label>
            <label style="font-size: 11px; display: flex; align-items: center; gap: 5px; color: var(--text-color);">
                <input type="checkbox" id="chk-compas-ds"> compas.datastructures as cd
            </label>
            <div style="font-size: 11px; font-weight: bold; color: var(--text-color-secondary); margin-top: 5px; margin-bottom: 5px;">COMMON CLASSES</div>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                 <label style="font-size: 11px; display: flex; align-items: center; gap: 3px; color: var(--text-color);"><input type="checkbox" id="chk-pt"> Point</label>
                 <label style="font-size: 11px; display: flex; align-items: center; gap: 3px; color: var(--text-color);"><input type="checkbox" id="chk-vec"> Vector</label>
                 <label style="font-size: 11px; display: flex; align-items: center; gap: 3px; color: var(--text-color);"><input type="checkbox" id="chk-box"> Box</label>
                 <label style="font-size: 11px; display: flex; align-items: center; gap: 3px; color: var(--text-color);"><input type="checkbox" id="chk-frame"> Frame</label>
                 <label style="font-size: 11px; display: flex; align-items: center; gap: 3px; color: var(--text-color);"><input type="checkbox" id="chk-mesh"> Mesh</label>
            </div>
        </div>

        <div id="left-panel">
            <div id="file-list-wrapper"></div>
            <!-- Global output removed in favor of per-file output -->
        </div>
        
        <div id="splitter"></div>
        
        <div id="right-panel">
            <div id="viewport"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs/loader.js"></script>
    
    <script src="viewport.js"></script>
    <script src="app.js"></script>
</body>
</html>
